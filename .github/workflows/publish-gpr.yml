# Publish @ukituki-ps/april-{tokens,ui} to GitHub Packages (private npm registry).
# Self-hosted runner on Dev laptop (labels: ci,profile).
# GITHUB_TOKEN from workflow permissions has packages:write scope.
name: Publish DS to GPR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ds-gpr
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, ci, profile]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build packages (pnpm via corepack)
        shell: bash
        run: |
          set -ex
          corepack enable || true
          corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile || pnpm install
          pnpm build

      - name: Configure npm auth for GPR publish
        shell: bash
        run: |
          set -ex
          # Per-publish .npmrc — does NOT affect pnpm workspace resolution
          cat > .npmrc-publish <<'EOF'
          @ukituki-ps:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF

      - name: Publish @ukituki-ps/april-tokens
        working-directory: packages/tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          npm publish --access restricted --registry=https://npm.pkg.github.com \
            --.npmrc=$(pwd)/../../.npmrc-publish 2>&1 || echo "SKIP: version already published"

      - name: Publish @ukituki-ps/april-ui
        working-directory: packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          npm publish --access restricted --registry=https://npm.pkg.github.com \
            --.npmrc=$(pwd)/../../.npmrc-publish 2>&1 || echo "SKIP: version already published"
