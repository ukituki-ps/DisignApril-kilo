# Publish @ukituki-ps/april-{tokens,ui} to GitHub Packages (private npm registry).
# Self-hosted runner: labels ci,profile + self-hosted,Linux,X64 (default).
# GITHUB_TOKEN from permissions:write scope handles npm publish auth.
name: Publish DS to GPR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ds-gpr
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, ci, profile]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify dist exists
        shell: bash
        run: |
          for pkg in packages/tokens packages/ui; do
            if [ ! -d "$pkg/dist" ]; then
              echo "ERROR: $pkg/dist missing — run pnpm build locally before publishing"
              exit 1
            fi
          done
          echo "OK: dist directories present"

      - name: Publish @ukituki-ps/april-{tokens,ui} to GPR
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/publish-gpr.sh
