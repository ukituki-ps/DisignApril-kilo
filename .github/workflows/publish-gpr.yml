name: Publish DS 0.1.12 to GPR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: [self-hosted, ci, profile]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ukituki-ps"

      - name: Build packages
        shell: bash
        run: |
          corepack enable || true
          corepack prepare pnpm@latest --activate || true
          npm install -g pnpm || true
          pnpm install --frozen-lockfile || pnpm install
          pnpm build

      - name: Publish @ukituki-ps/april-tokens 0.1.12
        working-directory: packages/tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish --access public --registry=https://npm.pkg.github.com 2>&1 || echo "Already published"

      - name: Publish @ukituki-ps/april-ui 0.1.12
        working-directory: packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish --access public --registry=https://npm.pkg.github.com 2>&1 || echo "Already published"
