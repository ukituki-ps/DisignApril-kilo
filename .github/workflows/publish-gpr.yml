# Publish @ukituki-ps/april-{tokens,ui} to GitHub Packages (private npm registry).
# Self-hosted runner: labels ci,profile + self-hosted,Linux,X64 (default).
# GITHUB_TOKEN from permissions:write scope handles npm publish auth.
name: Publish DS to GPR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ds-gpr
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, ci, profile]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm + GPR auth
        shell: bash
        run: |
          set -ex
          corepack enable || true
          corepack prepare pnpm@9.15.9 --activate || true

      - name: Configure GPR auth for pnpm workspace resolve
        shell: bash
        run: |
          set -ex
          cat >> .npmrc <<EOF
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install and build
        shell: bash
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Publish @ukituki-ps/april-{tokens,ui} to GPR
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/publish-gpr.sh
